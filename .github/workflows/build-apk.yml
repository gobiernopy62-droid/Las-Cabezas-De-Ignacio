name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Sincronizar archivos
        run: npx cap sync android

      - name: Generar íconos desde LasCabezasDeIgnacio.png
        run: |
          mkdir -p assets
          cp www/LasCabezasDeIgnacio.png assets/icon.png
          npx @capacitor/assets generate --iconBackgroundColor '#1a1a2e' --iconBackgroundColorDark '#1a1a2e' --splashBackgroundColor '#1a1a2e' --splashBackgroundColorDark '#1a1a2e'

      - name: Dar permisos a Gradle
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: las-cabezas-de-ignacio-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
